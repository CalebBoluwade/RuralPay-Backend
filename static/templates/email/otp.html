{{define "content"}}
<h2>{{.Title}}</h2>
<p>Use the code below to complete your request. It expires in <strong>{{.ExpiresIn}}</strong>.</p>

<div style="text-align:center;margin:32px 0;">
  <div style="display:inline-block;background:#a3e635;color:#000;font-size:36px;font-weight:700;letter-spacing:12px;padding:20px 36px;border-radius:8px;">
    {{.OTP}}
  </div>
</div>

<p style="font-size:13px;color:#6b7280;">If you did not request this, you can safely ignore this email.</p>
{{end}}
