<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pay with RuralPay</title>
  <link rel="stylesheet" href="/static/qr_landing.css"/>
</head>
<body>
  <div class="container">
    <div class="header">
      <img src="/static/bank-logos/RuralPayLogo.jpg" alt="RuralPay"/>
      <h1>RuralPay</h1>
    </div>
    <div class="body">
      <div class="notice">
        <strong>Open in your Banking App</strong>
        <p>RuralPay Isn't Installed On This Device. Select Your Bank Below To Complete This Payment.</p>
      </div>

      <p class="section-label">Choose your bank to pay</p>
      <div class="bank-grid">
        {{range .Banks}}
        <a class="bank-btn" href="#" data-scheme="{{.Scheme}}" data-fallback="{{.FallbackURL}}">
          <img src="/static/bank-logos/{{.Logo}}" alt="{{.Name}}"/>
          <span class="bank-name">{{.Name}}</span>
        </a>
        {{end}}
      </div>

      <div class="divider">— or get the RuralPay app —</div>
      <div class="store-links">
        <a class="store-btn" href="https://apps.apple.com/app/ruralpay" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
          App Store
        </a>
        <a class="store-btn" href="https://play.google.com/store/apps/ruralpay" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24"><path d="M3.18 23.76c.3.17.64.22.98.14l12.09-6.98-2.56-2.56-10.51 9.4zm-1.1-20.3C2.03 3.73 2 4.01 2 4.32v15.36c0 .31.03.59.08.86l10.64-10.64L2.08 3.46zM20.49 10.3l-2.56-1.48-2.87 2.87 2.87 2.87 2.59-1.5c.74-.43.74-1.33-.03-1.76zM4.16.24L16.25 7.22l-2.56 2.56L3.18.38C3.52.3 3.86.07 4.16.24z"/></svg>
          Google Play
        </a>
      </div>
    </div>
    <div class="footer">&copy; RuralPay. Secure payment redirect.</div>
  </div>

  <script nonce="{{.Nonce}}" src="/static/qr_landing.js"></script>
</body>
</html>
